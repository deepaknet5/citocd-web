<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .brand-stroke {
      stroke: #000000;
    }
    @media (prefers-color-scheme: dark) {
      .brand-stroke {
        stroke: #FFFFFF;
      }
    }
  </style>
  <rect width="100" height="100" rx="24" fill="none"/>
  <!-- Left chevron representing CI (bright red) -->
  <path d="M25,25 L50,50 L25,75" fill="none" stroke="#FF1E1E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right chevron representing CD (theme-adaptive black/white) -->
  <path d="M50,25 L75,50 L50,75" fill="none" class="brand-stroke" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
