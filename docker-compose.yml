services:
  citocd-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citocd-web
    restart: unless-stopped
    ports:
      - "3004:80"
    networks:
      - citocd-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  citocd-network:
    driver: bridge
